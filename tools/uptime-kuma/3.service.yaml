---
apiVersion: v1
kind: Service
metadata:
  name: uptime-kuma
  namespace: tools
  labels:
    app: uptime-kuma
spec:
  selector:
    app: uptime-kuma
  type: ClusterIP
  ports:
    - port: 3001
      name: https
      targetPort: 3001
      protocol: TCP
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: uptime-kuma
  namespace: tools
  annotations:
    nginx.ingress.kubernetes.io/proxy-body-size: "5000m"
    nginx.ingress.kubernetes.io/proxy-connect-timeout: "600"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "600"
    nginx.ingress.kubernetes.io/proxy-read-timeout: "600"
  labels:
    app: uptime-kuma
spec:
  ingressClassName: nginx
  rules:
  - host: uptime-kuma.github.icu
    http:
      paths:
      - backend:
          service:
            name: uptime-kuma
            port:
              number: 3001
        path: /
        pathType: Prefix
  tls:
  - hosts:
    - uptime-kuma.github.icu
    secretName: github-tls
